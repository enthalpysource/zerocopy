name: Anneal Tests

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings
  CARGO_ZEROCOPY_AUTO_INSTALL_TOOLCHAIN: 1

jobs:
# Docker jobs removed

  anneal_tests:
    name: Anneal Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push benchmark data to the storage branch
    steps:
      - name: Record job start time
        id: job_start_time
        run: echo "unix=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore Nix Cache
        uses: nix-community/cache-nix-action/restore@v6
        with:
          primary-key: ${{ runner.os }}-tests-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: ${{ runner.os }}-tests

      # Ensure `llms-full.txt` file is up-to-date.
      - name: Check doc generation
        run: |
          nix develop --command cargo run -p doc_gen -- --check

      # Run unit tests separately
      - name: Run unit tests
        run: |
          nix develop --command cargo test --verbose --bin cargo-anneal

      # Run all tests
      - name: Run all tests
        run: |
          start=$(date +%s)
          nix develop --command cargo test --verbose
          end=$(date +%s)
          duration=$((end - start))
          echo "Test Time: $duration seconds"
          echo "[{\"name\": \"Test Time\", \"unit\": \"seconds\", \"value\": $duration}]" > test_time.json

      - name: Combine benchmarks
        env:
          JOB_START_TIME_UNIX: ${{ steps.job_start_time.outputs.unix }}
        run: |
          total_duration=$(( $(date +%s) - $JOB_START_TIME_UNIX ))
          echo "Total CI Duration (All Steps): $total_duration seconds"
          echo "[{\"name\": \"Total CI Duration (All Steps)\", \"unit\": \"seconds\", \"value\": $total_duration}]" > total_time.json

          # Create a dummy pull_time.json since we don't pull docker images anymore
          echo "[{\"name\": \"Docker Pull Time\", \"unit\": \"seconds\", \"value\": 0}]" > pull_time.json

          jq -n \
            --slurpfile pull pull_time.json \
            --slurpfile test test_time.json \
            --slurpfile total total_time.json \
            '[
              $pull[0][0],
              $test[0][0],
              $total[0][0]
            ]' > output.json

      - name: Store CI duration benchmarks
        uses: benchmark-action/github-action-benchmark@a60cea5bc7b49e15c1f58f411161f99e0df48372 # v1.22.0
        with:
          name: CI Durations
          tool: 'customSmallerIsBetter'
          output-file-path: output.json
          gh-pages-branch: benchmark-data
          auto-push: true
          save-data-file: ${{ github.ref == 'refs/heads/main' }}
          benchmark-data-dir-path: dashboard
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Nix Cache
        if: always()
        uses: nix-community/cache-nix-action/save@v6
        with:
          primary-key: ${{ runner.os }}-tests-${{ hashFiles('**/flake.lock') }}
          gc-max-store-size: 2G
          purge: true
          purge-created: 604800

  verify_examples:
    name: Verify example (${{ matrix.example }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        example:
          - abs
          - anatomy
          - checked_add
          - const_generics
          - design_doc
          - linked_list
          - namespaces
          - never_type
          - ptr_concat
          - size_of_align_of
          - swap
          - unchecked_get
          - update_max
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/boost

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore Nix Cache
        uses: nix-community/cache-nix-action/restore@v6
        with:
          primary-key: ${{ runner.os }}-examples-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: ${{ runner.os }}-examples

      - name: Verify example
        env:
          EXAMPLE: ${{ matrix.example }}
        run: |
          KNOWN_FAILING=("design_doc" "never_type" "ptr_concat")
          example="$EXAMPLE"

          expect_failure=0
          for kf in "${KNOWN_FAILING[@]}"; do
            if [ "$kf" = "$example" ]; then
              expect_failure=1
              break
            fi
          done

          echo "Verifying $example (expect failure: $expect_failure)"

          if nix develop --command cargo run verify --unsound-allow-is-valid --example "$example"; then
            if [ "$expect_failure" -eq 1 ]; then
              echo "::error::Example $example succeeded but was expected to fail."
              exit 1
            else
              echo "Example $example succeeded."
            fi
          else
            if [ "$expect_failure" -eq 1 ]; then
              echo "Example $example failed as expected."
            else
              echo "::error::Example $example failed."
              exit 1
            fi
          fi

      - name: Save Nix Cache
        if: always()
        uses: nix-community/cache-nix-action/save@v6
        with:
          primary-key: ${{ runner.os }}-examples-${{ hashFiles('**/flake.lock') }}
          gc-max-store-size: 2G
          purge: true
          purge-created: 604800


  # Used to signal to branch protections that all other jobs have succeeded.
  all-jobs-succeed:
      # WARNING: This name is load-bearing! It's how GitHub's settings UI
      # configures which jobs to block on. DO NOT change this name without
      # updating the settings UI to match.
      name: All checks succeeded (anneal.yml)
      # On failure, we run and unconditionally exit with a failing status code.
      # On success, this job is skipped. Jobs skipped using `if:` are considered
      # to have succeeded:
      #
      # https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks#handling-skipped-but-required-checks
      if: failure()
      runs-on: ubuntu-latest
      needs: [anneal_tests, verify_examples]
      steps:
        - name: Mark the job as failed
          run: exit 1

name: Codex Platform Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: macos-x86_64
            runner: macos-15-intel
          - target: macos-aarch64
            runner: macos-latest

    steps:
      - name: Print platform
        run: |
          set -eux
          uname -a
          uname -m
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"

      - name: Print macOS details
        if: runner.os == 'macOS'
        run: |
          set -eux
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
